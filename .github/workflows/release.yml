name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: |
          VERSION=${{ github.ref_name }}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA=${{ github.sha }}
          LDFLAGS="-w -s -X main.version=$VERSION -X main.buildDate=$BUILD_DATE -X main.commitSHA=$COMMIT_SHA"
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o mango_linux_amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o mango_linux_arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o mango_darwin_amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o mango_darwin_arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o mango_windows_amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mango_linux_amd64
            mango_linux_arm64
            mango_darwin_amd64
            mango_darwin_arm64
            mango_windows_amd64.exe
